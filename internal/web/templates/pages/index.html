<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>music-dl - 聚合搜索与解析</title>
    <link rel="icon" href="{{.Root}}/icon.png" type="image/png">
    
    <link rel="stylesheet" href="{{.Root}}/style.css">
    <link rel="stylesheet" href="{{.Root}}/videogen.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.css"/>
</head>
<body>

<!-- 下载中面板 -->
<div id="download-panel" class="download-panel" style="display:none;">
    <div class="download-panel-header">
        <span><i class="fa-solid fa-download"></i> 下载中</span>
        <span class="download-panel-close" onclick="closeDownloadPanel()">&times;</span>
    </div>
    <div class="download-panel-body" id="download-panel-body"></div>
    <div class="download-panel-footer" id="download-panel-footer"></div>
</div>

<!-- 右侧工具栏 -->
<div class="right-toolbar">
    <!-- 功能按钮组 -->
    <div class="rt-btn" onclick="openSystemConfig()" title="系统配置"><i class="fa-solid fa-gear"></i></div>
    <form id="auth-float-form" class="rt-form" action="{{.Root}}/logout" method="post" title="登录">
        <button id="auth-float-button" type="submit"><i id="auth-float-icon" class="fa-solid fa-right-to-bracket"></i></button>
    </form>
    <div class="rt-btn" onclick="openLocalMusicPage()" title="本地音乐"><i class="fa-solid fa-folder-plus"></i></div>
    <div class="rt-btn" onclick="openDownloadRecordsModal()" title="下载记录"><i class="fa-solid fa-clock-rotate-left"></i></div>

    <div class="rt-separator"></div>

    <!-- 翻页按钮组 -->
    <div class="rt-btn" onclick="floatPageUp()" title="上一页"><i class="fa-solid fa-chevron-up"></i></div>
    <div class="rt-page-num" id="float-page-num" onclick="floatPageNumClick()">1</div>
    <div class="rt-btn" onclick="floatPageDown()" title="下一页"><i class="fa-solid fa-chevron-down"></i></div>

    <div class="rt-separator"></div>

    <!-- 滚动按钮组 -->
    <div class="rt-btn" onclick="scrollToTop()" title="回到顶部"><i class="fa-solid fa-arrow-up"></i></div>
    <div class="rt-btn" onclick="scrollToBottom()" title="回到底部"><i class="fa-solid fa-arrow-down"></i></div>
</div>

<div class="container">
    {{template "search_box" .}}

    {{template "playlist_categories" .}}

    {{template "playlist_source_tabs" .}}

    {{template "playlist_grid" .}}

    {{template "song_list" .}}
</div>

{{template "modals" .}}

<div id="aplayer"></div>
<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

<script>
    window.API_ROOT = "{{.Root}}";
    window.sakanaInstance = null;

    function initSakanaWidget() {
        if (window.innerWidth > 768) {
            window.sakanaInstance = new SakanaWidget().mount('#sakana-widget');
        }
    }
</script>

<script src="{{.Root}}/app.js"></script>
{{template "videogen_modal" .}}
<script src="{{.Root}}/videogen.js"></script>

<div id="sakana-container" class="sakana-container">
    <div id="sakana-widget"></div>
</div>

<script async onload="initSakanaWidget()" src="https://cdn.jsdelivr.net/npm/sakana-widget@2.7.1/lib/sakana.min.js"></script>

</body>
</html>
